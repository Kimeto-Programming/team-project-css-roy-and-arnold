<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration and Service Request Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="logo">COMPANY REGISTRATION</h1>
    </header>

    <main class="container">
        <section class="registration-card">
            <h2 class="section-heading">Service Request Form</h2>
            <p class="form-instruction">Please fill in the details below to register your company 
                and request services.</p>

     <form  method="post" action="#">
        <fieldset>
            <legend><strong>Personal Information </strong></legend>
            <div class="form-group">
    <label for="fullname">Full Name:</label><br>
    <input type="text" id="fullname" name="fullname" placeholder="e.g. Peter Parker" required 
           minlength="3" maxlength="50" 
           pattern="^[A-Z][a-z]+(\s[A-Z][a-z]+)+$" 
           title="Please enter at least a first and last name, each starting with a capital letter.">
</div>

            <div class="form-group">
                        <label for="email">Email:</label><br>
                        <input type="email" id="email" name="email" placeholder="peter.parker@curbox.com" required minlength="5" maxlength="100" pattern="[a-zA-Z0-9._%+-]+@curbox\.com$" title="Email format: name@curbox.com">
                    </div>

            <div class="form-group">
                        <label for="phone">Phone:</label><br>
                        <input type="tel" id="phone" name="phone" placeholder="0734567890" required pattern="07[0-9]{8}" title="Phone number must be 10 digits starting with 07">
                    </div>
        </fieldset>

        <fieldset>
            <legend><strong>Company Information</strong></legend>
            <div class="form-group">
                        <label for="companyname">Company Name:</label><br> 
                        <input type="text" id="companyname" name="companyname" placeholder="Curbox" required minlength="2" maxlength="100">
                    </div>

            <div class="form-group">
                        <label for="companywebsite">Company Website:</label><br>
                        <input type="text" id="companywebsite" name="companywebsite" placeholder="https://www.curbox.com" required minlength="2" maxlength="100" pattern="https://www\.[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}" title="Website must be in the format: https://www.curbox.com">
                    </div>

            <div class="form-group">
                        <label for="companysize">Company Size:</label><br>
                        <select id="companysize" name="companysize" required>
                            <option value="">Please choose an option</option>
                            <option value="1-10">1-10 employees</option>
                            <option value="11-50">11-50 employees</option>
                            <option value="100+">100+ employees</option>
                        </select>
                    </div>

                <div class="form-group">
                        <label for="industry">Industry:</label><br>
                        <input type="text" id="industry" name="industry" list="industries" required>
                        <datalist id="industries">
                            <option value="Primary">
                            <option value="Secondary">
                            <option value="Tertiary">
                            <option value="Quaternary">
                        </datalist>
                    </div>
                </fieldset>
                <fieldset>
                    <legend><strong>Service Request</strong></legend>
                    <div class="form-group">
                        <label>Type of Service:</label><br>
                        <input type="radio" id="professionalservices" name="servicetype" value="professionalservices" required>
                        <label for="professionalservices">Professional Services</label><br>
                        <input type="radio" id="operational" name="servicetype" value="operational">
                        <label for="operational">Operational and Support Services</label>
                    </div>

                <div class="form-group">
                        <label>Preferred Contact Method:</label><br>
                        <input type="checkbox" id="contact_email" name="contactmethod" value="email">
                        <label for="contact_email">Email</label><br>
                        <input type="checkbox" id="contact_phone" name="contactmethod" value="phone">
                        <label for="contact_phone">Phone</label>
                    </div>
                
                <div class="form-group">
                        <label for="appointmentdate">Appointment Date:</label><br>
                        <input type="date" id="appointmentdate" name="appointmentdate" required min="2026-01-01">
                    </div>

                <div class="form-group">
                        <label for="appointmenttime">Appointment Time:</label><br>
                        <input type="time" id="appointmenttime" name="appointmenttime" required>
                    </div>

                <div class="form-group">
                        <label for="budget">Budget Range (KSHS):</label><br>
                        <input type="number" id="budget" name="budget" min="500" max="100000" step="500" placeholder="Min 500">
                    </div>
                </fieldset>

                <fieldset>
                    <legend><strong>Additional Information</strong></legend>
                    <div class="form-group">
                        <label for="additionalinfo">Additional Information:</label><br>
                        <textarea id="additionalinfo" name="additionalinfo" rows="4" cols="50" placeholder="Enter details here..."></textarea>
                    </div>

                    <div class="form-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">I agree to the Terms and Conditions</label>
                    </div>
                </fieldset>

                <div class="button-row">
    <button type="submit" class="submit-btn">Submit Registration</button>
    <button type="reset" class="reset-btn">Reset Form</button>
</div>
            </form>
        </section>
    </main>
</body>
</html>
